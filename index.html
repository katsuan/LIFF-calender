<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIFF Calendar Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">LIFF x Google Calendar</p>
        <h1>予定リンクを作って<br />LINEでそのまま送る</h1>
        <p class="lead">
          件名、開始・終了日時、詳細、関連URLからGoogleカレンダー登録リンクを生成し、
          Flex Messageとして送信できます。
        </p>
      </header>

      <main class="grid">
        <section class="panel config-panel">
          <div class="panel-header">
            <h2>LIFF設定</h2>
            <span id="liffState" class="status-chip">未初期化</span>
          </div>
          <label class="field">
            <span>LIFF ID</span>
            <input id="liffIdInput" type="text" placeholder="例: 2000000000-xxxxxxxx" />
          </label>
          <div class="button-row">
            <button id="initButton" class="button button-dark" type="button">LIFFを初期化</button>
            <button id="logoutButton" class="button button-ghost" type="button">設定をクリア</button>
          </div>
          <p class="note">
            初回のみLIFF IDを設定します。入力値はブラウザのローカルストレージに保存されます。
          </p>
          <div id="statusBox" class="status-box" aria-live="polite"></div>
        </section>

        <section class="panel form-panel">
          <div class="panel-header">
            <h2>予定情報</h2>
            <span id="timezoneLabel" class="meta-chip"></span>
          </div>
          <form id="eventForm">
            <label class="field">
              <span>件名</span>
              <input id="titleInput" name="title" type="text" maxlength="80" required placeholder="例: 定例ミーティング" />
            </label>
            <div class="field-group">
              <label class="field">
                <span>開始日時</span>
                <input id="startInput" name="start" type="datetime-local" required />
              </label>
              <label class="field">
                <span>終了日時</span>
                <input id="endInput" name="end" type="datetime-local" required />
              </label>
            </div>
            <label class="field">
              <span>予定詳細</span>
              <textarea
                id="detailsInput"
                name="details"
                rows="5"
                placeholder="例: 当日の議題、参加方法、持ち物など"
              ></textarea>
            </label>
            <label class="field">
              <span>関連URL</span>
              <input
                id="urlInput"
                name="url"
                type="url"
                placeholder="https://example.com/meeting-room"
              />
            </label>
          </form>
        </section>

        <section class="panel action-panel">
          <div class="panel-header">
            <h2>生成結果</h2>
            <span class="meta-chip">Flex対応</span>
          </div>
          <label class="field">
            <span>GoogleカレンダーURL</span>
            <textarea id="calendarUrlOutput" rows="5" readonly></textarea>
          </label>
          <div class="button-row">
            <button id="openCalendarButton" class="button button-accent" type="button">URLを開く</button>
            <button id="copyCalendarButton" class="button button-ghost" type="button">URLをコピー</button>
          </div>
          <div class="button-row">
            <button id="sendCurrentChatButton" class="button button-line" type="button">現在のトークに送信</button>
            <button id="shareTargetButton" class="button button-dark" type="button">送信先を選んで共有</button>
          </div>
          <p class="note">
            `現在のトークに送信` はLINEアプリ内で開いたLIFFのみ利用できます。
          </p>
        </section>

        <section class="panel preview-panel">
          <div class="panel-header">
            <h2>Flexプレビュー</h2>
            <span class="meta-chip">Bubble</span>
          </div>
          <div id="previewCard" class="preview-card"></div>
        </section>
      </main>
    </div>
  </body>
</html>
