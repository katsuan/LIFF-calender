<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予定リンク作成</title>
    <meta
      name="description"
      content="Googleカレンダー登録用URLを作成して、LINEのトークへFlexメッセージで共有するLIFFアプリ。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./assets/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="hero-kicker">LIFF x Google Calendar</p>
        <h1>予定リンク作成</h1>
        <p class="hero-text">
          Googleカレンダー登録用URLを生成し、LINEのトークにFlexメッセージで共有します。
        </p>
      </section>

      <section class="card card-form">
        <div class="card-header">
          <div>
            <p class="section-label">Basic</p>
            <h2>予定情報</h2>
          </div>
          <span id="liffBadge" class="badge">LIFF確認中</span>
        </div>

        <form id="eventForm" novalidate>
          <label class="field">
            <span>件名</span>
            <input id="title" type="text" maxlength="80" placeholder="例：打ち合わせ" />
          </label>

          <div class="date-stack">
            <fieldset class="date-card">
              <legend>開始日時</legend>
              <div class="datetime-grid">
                <label class="field field-compact">
                  <span>日付</span>
                  <input id="startDate" type="date" />
                </label>
                <label class="field field-compact">
                  <span>時刻</span>
                  <input id="startTime" type="time" step="900" />
                </label>
              </div>
            </fieldset>

            <fieldset class="date-card">
              <legend>完了日時</legend>
              <div class="datetime-grid">
                <label class="field field-compact">
                  <span>日付</span>
                  <input id="endDate" type="date" />
                </label>
                <label class="field field-compact">
                  <span>時刻</span>
                  <input id="endTime" type="time" step="900" />
                </label>
              </div>
            </fieldset>
          </div>

          <div class="schedule-tools">
            <div id="durationSummary" class="duration-summary">開始日時を入力すると所要時間を表示します。</div>
            <div class="duration-actions">
              <button class="button button-soft button-chip" type="button" data-duration-minutes="30">30分</button>
              <button class="button button-soft button-chip is-active" type="button" data-duration-minutes="60">60分</button>
              <button class="button button-soft button-chip" type="button" data-duration-minutes="90">90分</button>
              <button class="button button-soft button-chip" type="button" data-duration-minutes="120">120分</button>
            </div>
          </div>

          <section class="optional-section">
            <div class="section-headline">
              <p class="section-label">Optional</p>
              <h3>任意項目</h3>
            </div>

            <label class="field">
              <span>場所</span>
              <input id="location" type="text" placeholder="例：渋谷オフィス 5F 会議室A" />
            </label>

            <label class="field">
              <span>関連URL</span>
              <input id="url" type="url" placeholder="https://example.com" />
            </label>

            <label class="field">
              <span>予定詳細</span>
              <textarea id="details" rows="5" placeholder="補足情報やメモ"></textarea>
            </label>
          </section>

          <details id="optionalAccordion" class="accordion">
            <summary>
              <span>詳細オプション</span>
              <span id="optionalCount" class="summary-chip">0件入力中</span>
            </summary>

            <div class="accordion-body">
              <label class="field">
                <span>タイムゾーン `ctz`</span>
                <input id="timezone" type="text" placeholder="例：Asia/Tokyo" />
              </label>

              <label class="field">
                <span>繰り返しルール `recur`</span>
                <input id="recur" type="text" placeholder="例：RRULE:FREQ=WEEKLY;BYDAY=MO" />
              </label>

              <div class="field-grid">
                <label class="field">
                  <span>参照元名 `sprop=name:`</span>
                  <input id="sourceName" type="text" placeholder="例：LIFF Calendar Share" />
                </label>

                <label class="field">
                  <span>参照元URL `sprop=website:`</span>
                  <input id="sourceUrl" type="url" placeholder="https://katsuan.github.io" />
                </label>
              </div>

              <section class="custom-params">
                <div class="custom-params-header">
                  <div>
                    <p class="section-label">Custom</p>
                    <h3>その他のクエリパラメータ</h3>
                  </div>
                  <button id="addParamButton" class="button button-soft" type="button">項目を追加</button>
                </div>
                <div id="customParamsList" class="custom-params-list"></div>
                <p class="help-text">
                  任意のキーと値を追加できます。未入力の行はURLに含めません。
                </p>
              </section>
            </div>
          </details>
        </form>
      </section>

      <section class="card card-actions">
        <div class="card-header">
          <div>
            <p class="section-label">Output</p>
            <h2>生成結果</h2>
          </div>
        </div>

        <label class="field">
          <span>GoogleカレンダーURL</span>
          <textarea id="generatedUrl" rows="4" readonly></textarea>
        </label>

        <div class="action-grid">
          <button id="openUrlButton" class="button button-main" type="button">URLを開く</button>
          <button id="copyUrlButton" class="button button-soft" type="button">URLをコピー</button>
          <button id="sendCurrentChatButton" class="button button-line" type="button">現在のトークに送信</button>
          <button id="shareTargetButton" class="button button-dark" type="button">送信先を選択</button>
        </div>

        <p id="statusMessage" class="message" aria-live="polite"></p>
      </section>

      <section class="card card-preview">
        <div class="card-header">
          <div>
            <p class="section-label">Preview</p>
            <h2>Flexプレビュー</h2>
          </div>
        </div>

        <div id="previewCard" class="preview-card"></div>
      </section>
    </main>
  </body>
</html>
